<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>collegeform</title>
     <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"> -->
    <!-- <link rel="stylesheet" href="style.css"> -->
   <link rel="stylesheet" href="lib/fontawesome.css">
</head>
<body>


<div id="container">
    <div id="modal-college">
        <div id="modal-child-college">
         <form action="" id="college-form">
            
          <div class="form-group">
            <input id="fileInput" type="file" name="image" accept=".jpg,.png,image/*">
          </div>

          <div class="form-group">
            <label for="">Full Name</label>
            <input type="text" name="fullname">
          </div>

          <div class="form-group">
            <label for="">Level</label>
            <input type="text" name="level">
          </div>
          <div class="form-group">
            <label for="">Degree</label>
            <input type="text" name="degree">
          </div>

          <div class="form-group">
            <label for="">Course</label>
            <input type="text" name="course">
          </div>
          <div class="form-group">
            <label for="">Email</label>
            <input type="text" name="email">
          </div>

          <div class="form-group">
            <label for="">Tel</label>
            <input type="text" name="tel">
          </div>
          
          <div class="form-group">
            <label for="">LGA of Origin</label>
            <input type="text" name="lga">
          </div>

          <div class="form-group">
            <label for="">Address</label>
            <input type="text" name="address">
          </div>

          <div class="form-group">
            <label for="">DOB</label>
            <input type="date" name="dob">
          </div>

          <div class="form-group">
            <label for="">Parent/Guardian Name</label>
            <input type="text" name="parentname">
          </div>

          <div class="form-group">
            <label for="">Parent/Guardian Tel</label>
            <input type="number" name="parenttel">
          </div>
         


          <button type="submit">Submit</button>
        </form>
      
        </div>
    </div>


 
</div>
<div class="spinner">
  <div class="ring"></div>
  <div class="text">L&K 2.0</div>
</div>
</body>
</html>
